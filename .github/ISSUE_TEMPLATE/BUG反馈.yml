name: 🪲 报个 bug
description: 报告QQ群智能守护者插件的错误或异常行为
title: "[BUG] "
labels: ["bug"]
assignees: [zcj-ui]
body:
  - type: markdown
    attributes:
      value: |
        ## 🛠️ 崩了？没事，盘它

        提交前瞅一眼：
        - 👌 插件已经更到最新版
        - 👌 确认不是 AstrBot 自身的问题
        - 👌 翻过已有的 Issue 没一样的

        ---

  - type: textarea
    id: description
    attributes:
      label: 😫 咋了
      description: 发生了什么灵异事件
      placeholder: "防刷屏开启之后，白名单里的群也给禁言了..."
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: 🎁 插件版本
      description: WebUI → 插件管理 能看到
      placeholder: "v2.2.2"
    validations:
      required: true

  - type: input
    id: astrbot-version
    attributes:
      label: 🧠 AstrBot 版本
      description: WebUI 底部或者启动的时候会打印
      placeholder: "v4.x.x"

  - type: dropdown
    id: platform
    attributes:
      label: 💭 走的哪个平台
      options:
        - QQ（NapCat / LLOneBot / go-cqhttp）
        - QQ官方（qq_official）
        - 企业微信
        - 钉钉
        - Telegram
        - Discord
        - 别的
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🧪 怎么触发的
      description: 一步一步来，让我能复现
      placeholder: |
        1. 插件设置里把防刷屏打开了...
        2. 跑到群里狂发了十几条...
        3. 然后就...

  - type: textarea
    id: expected
    attributes:
      label: 👍 本来该咋样

  - type: textarea
    id: actual
    attributes:
      label: 💀 结果成了啥样

  - type: textarea
    id: logs
    attributes:
      label: 🧾 甩个日志
      description: 把控制台那段红字原样贴过来（截图识别不了！）
      render: shell

  - type: textarea
    id: config
    attributes:
      label: 🎛️ 相关配置（懒得贴也行）
      description: 贴一下跟问题有关的设置片段
      render: json

  - type: markdown
    attributes:
      value: |
        > 谢谢 🫶 日志越全修得越快 ⚡
