name: 💭 功能建议
description: 为QQ群智能守护者插件提出新功能或改进建议
title: "[建议] "
labels: ["enhancement"]
assignees: [zcj-ui]
body:
  - type: textarea
    id: suggestion
    attributes:
      label: 建议描述
      description: 描述你想要的功能或改进
      placeholder: "比如：违规通知中 @ 群主，让管理员及时知晓"
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 什么情况下需要这个功能，能解决什么问题
      placeholder: "夜间有广告消息被撤回，群主未在线，希望能主动通知管理员"

  - type: textarea
    id: expected
    attributes:
      label: 预期效果
      description: 功能实现后大致如何使用
      placeholder: "撤回一条广告后，自动 @ 群主并附上'某群有广告已被处理'"

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案（可选）
      description: 目前没有这个功能时你是怎么应对的

  - type: textarea
    id: context
    attributes:
      label: 补充信息（可选）
      description: 截图、参考链接或其他有助于评估的内容

  - type: markdown
    attributes:
      value: |
        > 收到后会尽快评估。如果你有实现思路，欢迎提 PR。
