name: 💭 功能建议
description: 为QQ群智能守护者插件提出新功能或改进建议
title: "[建议] "
labels: ["enhancement"]
assignees: [zcj-ui]
body:
  - type: markdown
    attributes:
      value: |
        集 AI 审核、防刷屏、群管工具于一身，说说你还想要啥。

  - type: textarea
    id: suggestion
    attributes:
      label: 建议描述
      description: 一句话说清楚你想要什么功能或改进
      placeholder: "比如：能不能在违规通知里 @ 一下群主..."
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: 什么场景会用
      description: 啥时候需要这个功能，解决了什么麻烦
      placeholder: "半夜有人发广告，群主睡着了，机器人撤了但没人知道..."

  - type: textarea
    id: expected
    attributes:
      label: 你想象中的样子
      description: 功能做出来之后大概怎么操作
      placeholder: "机器人撤了一条广告 → 顺带 @ 群主说'你群刚被发了广告，已处理'"

  - type: textarea
    id: alternatives
    attributes:
      label: 有没有凑合用的办法（可选）
      description: 现在没这功能你是怎么凑合过来的

  - type: textarea
    id: context
    attributes:
      label: 截图 / 链接 / 随便说点啥（可选）
      description: 任何你觉得有帮助的信息

  - type: markdown
    attributes:
      value: |
        > 收到啦，会尽快评估。
